<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="app-container">
        <header>
            <h1>Expense Tracker</h1>
            <p class="subtitle">Minimal data for maximal clarity</p>
        </header>

        <section class="card summary-section" id="summary">
            <div class="summary-item">
                <span class="label">Total Spent</span>
                <span class="value" id="total-spent">$0.00</span>
            </div>
            <div class="summary-item">
                <span class="label">Categories</span>
                <div id="category-summary" class="category-list">
                    <!-- Categories will be injected here -->
                </div>
            </div>
        </section>

        <section class="card form-section" id="add-expense">
            <h2>Add New Expense</h2>
            <form id="expense-form">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" placeholder="e.g., Grocery Shopping" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" name="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Housing">Housing</option>
                            <option value="Health">Health</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn">Add Expense</button>
            </form>
        </section>

        <section class="card list-section">
            <h2>Recent Expenses</h2>
            <div class="table-container">
                <table id="expenses-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-body">
                        <!-- Expenses will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
